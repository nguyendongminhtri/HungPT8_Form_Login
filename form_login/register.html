<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4>Đăng ký tài khoản</h4>
                </div>
                <div class="card-body">
                    <form id="registerForm">
                        <!-- Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Họ và tên <span id="errorName" class="text-danger"></span></label>
                            <input type="text" class="form-control" id="name" placeholder="Nhập họ và tên">
                        </div>
                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Tên đăng nhập <span id="errorUsername" class="text-danger"></span></label>
                            <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email <span id="errorEmail" class="text-danger"></span></label>
                            <input type="email" class="form-control" id="email" placeholder="Nhập email">
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Mật khẩu <span id="errorPassword" class="text-danger"></span></label>
                            <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu">
                        </div>
                        <!-- Submit -->
                        <div class="d-grid mb-3">
                            <button type="button" class="btn btn-success" onclick="validateForm()">Đăng ký</button>
                        </div>
                        <!-- Nút chuyển về login (ẩn ban đầu) -->
                        <div class="d-grid">
                            <a id="loginBtn" class="btn btn-primary" style="display:none;" href="login.html">Chuyển về form đăng nhập</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function validateForm() {
        let name = document.getElementById("name").value.trim();
        let username = document.getElementById("username").value.trim();
        let email = document.getElementById("email").value.trim();
        let password = document.getElementById("password").value.trim();

        document.getElementById("errorName").innerText = "";
        document.getElementById("errorUsername").innerText = "";
        document.getElementById("errorEmail").innerText = "";
        document.getElementById("errorPassword").innerText = "";

        let isValid = true;

        if (name === "") {
            document.getElementById("errorName").innerText = " - Không được để trống";
            isValid = false;
        }

        if (username === "") {
            document.getElementById("errorUsername").innerText = " - Không được để trống";
            isValid = false;
        } else if (/\s/.test(username)) {
            document.getElementById("errorUsername").innerText = " - Không được có khoảng trắng";
            isValid = false;
        }

        let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (email === "") {
            document.getElementById("errorEmail").innerText = " - Không được để trống";
            isValid = false;
        } else if (!emailRegex.test(email)) {
            document.getElementById("errorEmail").innerText = " - Sai định dạng email";
            isValid = false;
        }

        let passwordRegex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[\W_]).+$/;
        if (password === "") {
            document.getElementById("errorPassword").innerText = " - Không được để trống";
            isValid = false;
        } else if (!passwordRegex.test(password)) {
            document.getElementById("errorPassword").innerText = " - Phải có chữ hoa, chữ thường, số và ký tự đặc biệt";
            isValid = false;
        }

        if (isValid) {
            let user = { name, username, email, password };
            sessionStorage.setItem("user", JSON.stringify(user));
            document.getElementById("registerForm").reset();
            document.getElementById("loginBtn").style.display = "block"; // hiện nút login
        }
    }

    // // Hàm chuyển trang bằng JS
    // function goToLogin() {
    //     window.location.href = "../form_login/login.html";
    // }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
