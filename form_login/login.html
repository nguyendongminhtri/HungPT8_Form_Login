<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Form Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
          <h4>Đăng nhập</h4>
        </div>
        <div class="card-body">
          <form id="loginForm">
            <!-- Username -->
            <div class="mb-3">
              <label for="username" class="form-label">
                Tên đăng nhập <span id="errorLoginUsername" class="text-danger"></span>
              </label>
              <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập">
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label for="password" class="form-label">
                Mật khẩu <span id="errorLoginPassword" class="text-danger"></span>
              </label>
              <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu">
            </div>

            <!-- Button -->
            <div class="d-grid">
              <button type="button" class="btn btn-primary" onclick="login()">Đăng nhập</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function login() {
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    // Reset lỗi
    document.getElementById("errorLoginUsername").innerText = "";
    document.getElementById("errorLoginPassword").innerText = "";

    let user = JSON.parse(sessionStorage.getItem("user"));

    if (!user) {
      alert("Chưa có tài khoản đăng ký!");
      return;
    }

    let isValid = true;

    // Validate username
    if (username === "") {
      document.getElementById("errorLoginUsername").innerText = " - Không được để trống";
      isValid = false;
    }

    // Validate password
    if (password === "") {
      document.getElementById("errorLoginPassword").innerText = " - Không được để trống";
      isValid = false;
    }

    // Logic đăng nhập
    if (isValid) {
      if (username === user.username && password === user.password) {
        alert("Đăng nhập thành công! Xin chào " + user.name);
        // 👉 Chuyển hướng về trang chủ
        window.location.href = "../index.html";
        // Nếu index.html nằm cùng thư mục thì chỉ cần "index.html"
      } else {
        alert("Sai tên đăng nhập hoặc mật khẩu!");
      }
    }
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
